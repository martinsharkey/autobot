<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e1e1e; color: #d4d4d4; height: 100vh; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 16px; }
        .message { margin-bottom: 12px; padding: 10px 14px; border-radius: 8px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .user { background: #264f78; color: #fff; margin-left: 20%; }
        .assistant { background: #2d2d2d; color: #d4d4d4; margin-right: 20%; border: 1px solid #3c3c3c; }
        .assistant h3 { color: #569cd6; margin: 8px 0 4px; }
        .assistant code { background: #1e1e1e; padding: 1px 4px; border-radius: 3px; font-size: 0.9em; }
        .assistant pre { background: #1e1e1e; padding: 8px; border-radius: 4px; margin: 4px 0; overflow-x: auto; }
        #input-area { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #3c3c3c; background: #252526; }
        #input { flex: 1; background: #3c3c3c; color: #d4d4d4; border: none; padding: 8px 12px; border-radius: 4px; font-size: 14px; outline: none; }
        #input:focus { outline: 1px solid #007acc; }
        #send-btn, #stop-btn { background: #007acc; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        #send-btn:hover { background: #1a8ad4; }
        #stop-btn { background: #c84b4b; }
        #stop-btn:hover { background: #d65c5c; }
        .status { font-size: 12px; color: #888; padding: 8px 16px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #424242; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="messages">
        <div class="message assistant">AUTOBOT ready. What would you like to do?</div>
    </div>
    <div id="input-area">
        <input type="text" id="input" placeholder="What should AUTOBOT do?" />
        <button id="send-btn">Send</button>
        <button id="stop-btn" style="display:none">Stop</button>
    </div>
    <script>
        (function() {
            const vscode = acquireVsCodeApi();
            const messages = document.getElementById('messages');
            const input = document.getElementById('input');
            const sendBtn = document.getElementById('send-btn');
            const stopBtn = document.getElementById('stop-btn');

            let currentAssistantMsg = null;

            sendBtn.addEventListener('click', () => {
                const text = input.value.trim();
                if (!text) return;
                input.value = '';
                vscode.postMessage({ command: 'sendMessage', text: text });
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') sendBtn.click();
            });

            stopBtn.addEventListener('click', () => {
                vscode.postMessage({ command: 'stop' });
                stopBtn.style.display = 'none';
                sendBtn.style.display = 'inline-block';
            });

            window.addEventListener('message', (event) => {
                const msg = event.data;
                switch (msg.command) {
                    case 'addUserMessage': {
                        const div = document.createElement('div');
                        div.className = 'message user';
                        div.textContent = msg.text;
                        messages.appendChild(div);
                        currentAssistantMsg = null;
                        sendBtn.style.display = 'none';
                        stopBtn.style.display = 'inline-block';
                        messages.scrollTop = messages.scrollHeight;
                        break;
                    }
                    case 'appendChunk': {
                        if (!currentAssistantMsg) {
                            currentAssistantMsg = document.createElement('div');
                            currentAssistantMsg.className = 'message assistant';
                            messages.appendChild(currentAssistantMsg);
                        }
                        currentAssistantMsg.innerHTML += msg.text.replace(/\n/g, '<br>');
                        messages.scrollTop = messages.scrollHeight;
                        if (msg.text.includes('Task Complete') || msg.text.includes('### Task Complete')) {
                            sendBtn.style.display = 'inline-block';
                            stopBtn.style.display = 'none';
                            currentAssistantMsg = null;
                        }
                        break;
                    }
                }
            });
        })();
    </script>
</body>
</html>
